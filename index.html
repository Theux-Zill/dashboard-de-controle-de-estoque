<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Controle de Estoque</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/grid.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <header>
        <h1>Dashboard - Controle de Estoque</h1>
    </header>

    <nav class="buscar-produto">
        <div class="form-search">
            <input class="form-input" name="search" type="text" placeholder="Nome do produto..."
                id="searchInput">
        </div>
    </nav>

    <section>
        <div class="container-adicionar">
            <h2 class="form-title">Adicionar Produto</h2>
            <br>
            <form class="adicionar-produto" id="addProductForm">
                <input class="form-input" name="productName" type="text" placeholder="Nome do Produto"
                    id="productNameInput" required>
                <input class="form-input" name="productQuantity" type="number" placeholder="Quantidade"
                    id="productQuantityInput" required min="1">
                <input class="form-input" name="productDate" type="date" placeholder="Data de Validade"
                    id="productDateInput" required>
                <button type="button" class="form-button" id="addProductButton">Adicionar</button>
            </form>

            <p id="errorMessage" style="color: red;"></p>
        </div>

        <div class="container-produtos">
            <h2 class="form-title">Produtos Cadastrados</h2>
            <div class="card">
                <table class="resumo-pesquisa">
                    <thead class="tabela-produto">
                        <tr>
                            <th class="produtos-cadastrados">Produto</th>
                            <th class="quantidade-cadastrado">Quantidade</th>
                            <th class="validade-cadastrado">Data</th>
                            <th class="produto-status">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 Dashboard - Controle de Estoque. Todos os direitos reservados.</p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
