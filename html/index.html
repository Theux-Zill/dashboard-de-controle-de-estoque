<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Controle de Estoque</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/reset.css">
</head>

<body>
    <header>
        <h1>Dashboard - Controle de Estoque</h1>
    </header>
    <div class="form-search">
        <p>Buscar Produtos</p>
        <input class="form-input" name="search" type="text" placeholder="Nome do produto ou Código..." id="searchInput">
        <button class="form-button" id="searchButton">Buscar</button>
    </div>

    <section>
        <div class="container">
            <h2 class="form-title">Adicionar Produto</h2>

            <div class="adicionar-produto">
                <input class="form-input" name="productName" type="text" placeholder="Adicionar Produto"
                    id="productNameInput">
                <button class="form-button" id="addProductButton">Adicionar</button>
            </div>
        </div>

        <div class="container">
            <h2 class="form-title">Resumo</h2>
            <div class="card">
                <ul class="resumo-pesquisa">
                    <li class="nome-pesquisado">pao forma tradicional 500g</li>
                    <li class="quantidade-pesquisado">10</li>
                    <li class="validade-produto">2023-12-31</li>
                </ul>
            </div>
        </div>

        <div class="container">
            <h2 class="form-title">Produtos Cadastrados</h2>
            <div class="card">
                <ul class="resumo-pesquisa">
                    <li class="produtos-cadastrados">Pao Forma Tradicional 500g</li>
                    <li class="quantidade-cadastrado">10</li>
                    <li class="validade-cadastrado">2023-12-31</li>
                    <li class="produto-status">Disponível</li>
                </ul>
            </div>
        </div>
    </section>
    <footer class="footer">
        <p>&copy; 2026 Dashboard - Controle de Estoque. Todos os direitos reservados.</p>
    </footer>

    <script src="/js/script.js"></script>
</body>

</html>
