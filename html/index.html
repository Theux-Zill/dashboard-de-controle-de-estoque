<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Controle de Estoque</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/grid.css">
</head>

<body>

    <header>
        <h1>Dashboard - Controle de Estoque</h1>
    </header>

    <nav class="buscar-produto">
        <div class="form-search">
            <input class="form-input" name="search" type="text" placeholder="Nome do produto ou Código..."
                id="searchInput">
        </div>
    </nav>

    <section>

        <div class="container-resumo">
            <h2 class="form-title">Resumo</h2>
            <div class="card"></div>
        </div>

        <div class="container-adicionar">
            <h2 class="form-title">Adicionar Produto</h2>
            <br>
            <div class="adicionar-produto">
                <input class="form-input" name="productName" type="text" placeholder="Nome do Produto"
                    id="productNameInput">
                <input class="form-input" name="productQuantidy" type="number" placeholder="Quantidade"
                    id="productQuantityInput">
                <input class="form-input" name="productDate" type="date" placeholder="Data de Validade"
                    id="productDateInput">
                <button class="form-button" id="addProductButton">Adicionar</button>
            </div>
        </div>

        <div class="container-produtos">
            <h2 class="form-title">Produtos Cadastrados</h2>
            <div class="card">
                <table class="resumo-pesquisa">
                    <thead class="tabela-produto">
                        <tr>
                            <th class="produtos-cadastrados">Produto</th>
                            <th class="quantidade-cadastrado">Quantidade</th>
                            <th class="validade-cadastrado">Data</th>
                            <th class="produto-status">Status</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 Dashboard - Controle de Estoque. Todos os direitos reservados.</p>
    </footer>

    <script src="/js/script.js"></script>
</body>

</html>
